name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
      
      - name: Install Goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"

      - name: Build app
        run: ./scripts/buildprod.sh
          
      - name: 'Migration'
        run: ./scripts/migrateup.sh

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
        with:
          version: '>= 363.0.0'

      - name: 'Deploy to gcloud'
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-487623/notely-ar-repo/notely:latest .
      
      - name: 'Deploy to cloud run'
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-487623/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project notely-487623 --max-instances=4